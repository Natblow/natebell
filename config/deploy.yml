<% require "dotenv"; Dotenv.load(".env") if File.exist?(".env") %>
# Kamal 2 - natebell portfolio
service: natebell
image: natblow/natebell

servers:
  web:
    - <%= ENV.fetch("KAMAL_SERVER_IP") %>

proxy:
  ssl: true
  hosts:
    - natebell.ca
    - www.natebell.ca
    - nathanbellow.com
    - www.nathanbellow.com
  app_port: 80

registry:
  server: ghcr.io
  username: natblow
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
